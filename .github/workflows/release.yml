name: Release

on:
  push:
    branches:
      - main
      - alpha

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        id: semantic
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-alpha:
    needs: release
    if: |
      needs.release.outputs.new_release_published == 'true' &&
      github.ref == 'refs/heads/alpha'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Building alpha release ${{ needs.release.outputs.new_release_version }}"
          echo "Tag: ${{ needs.release.outputs.new_release_git_tag }}"
          # Add your alpha build commands here
          # Example: npm run build:alpha
  
  build-prod:
    needs: release
    if: |
      needs.release.outputs.new_release_published == 'true' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Building production release ${{ needs.release.outputs.new_release_version }}"
          echo "Tag: ${{ needs.release.outputs.new_release_git_tag }}"
          # Add your production build commands here
          # Example: npm run build:prod
