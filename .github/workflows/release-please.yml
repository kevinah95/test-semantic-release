name: Release Please

on:
  push:
    branches:
      - main
      - alpha

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          target-branch: ${{ github.ref_name }}
      
      - name: Mark alpha releases as prerelease
        if: ${{ steps.release.outputs.release_created && github.ref_name == 'alpha' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          gh release edit ${{ steps.release.outputs.tag_name }} --prerelease --repo ${{ github.repository }}
